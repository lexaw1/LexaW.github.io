<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LexaW</title>

<style>
/* Temel ayarlar */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#0a0a0a;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  text-align:center;
  overflow-x:hidden;
}

/* Particle arka plan */
#particles-js{
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  z-index:-1;
}

/* Logo/profil resmi */
.logo{
  width:160px;
  height:160px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:20px;
  border:3px solid #00aaff;
  box-shadow:0 0 20px #00aaff;
  transition: transform 0.3s;
}

.logo:hover{
  transform: scale(1.1);
}

/* Başlık */
.hero h1{
  font-size:60px;
  letter-spacing:4px;
  background:linear-gradient(90deg,#00c3ff,#0066ff);
  -webkit-background-clip:text;
  color:transparent;
}

.hero p{
  color:#aaa;
  margin-bottom:40px;
}

/* Container */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
  width:80%;
  max-width:1000px;
  margin-bottom:40px;
}

/* Kart */
.card{
  background:#111;
  padding:25px;
  border-radius:12px;
  border:1px solid #222;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px);
  border-color:#00aaff;
}

.card h2{
  margin-bottom:10px;
  color:#00aaff;
}

.card p{
  color:#bbb;
}

/* Sosyal medya butonları */
.socials{
  margin-top:25px;
}

.socials a{
  margin:8px;
  text-decoration:none;
  color:white;
  padding:10px 18px;
  border:1px solid #333;
  border-radius:8px;
  transition:0.3s;
}

.socials a:hover{
  background:#00aaff;
}

/* Yetenek barları */
.bar{
  background:#222;
  height:8px;
  border-radius:5px;
  margin-bottom:15px;
}

.bar div{
  background:#00aaff;
  height:8px;
  border-radius:5px;
}

/* Footer */
footer{
  margin-top:40px;
  color:#555;
  font-size:14px;
}
</style>

</head>
<body>

<!-- Particle arka plan -->
<div id="particles-js"></div>

<!-- Hero / üst kısım -->
<div class="hero">
  <img src="logo.png" class="logo">
  <h1>LexaW</h1>
  <p>Developer • Creator • Builder</p>

  <div class="socials">
    <a href="https://github.com/kullanici" target="_blank">Github</a>
    <a href="https://discord.com/users/1441580255805440100" target="_blank">Discord</a>
    <a href="#" target="_blank">Instagram</a>
  </div>
</div>

<!-- Kartlar -->
<div class="container">

  <div class="card">
    <h2>Hakkımda</h2>
    <p>Güncel Olarak San Salvador Roleplay Sunucusunu Geliştirmek İle İlgileniyorum.</p>
  </div>

  <div class="card">
    <h2>Yetenekler</h2>
    <p>HTML</p>
    <div class="bar"><div style="width:70%"></div></div>

    <p>CSS</p>
    <div class="bar"><div style="width:60%"></div></div>

    <p>JavaScript</p>
    <div class="bar"><div style="width:40%"></div></div>
  </div>

  <div class="card">
    <h2>Projeler</h2>
    <p>MTA Roleplay sistemleri ve çeşitli web projeleri geliştiriyorum.</p>
  </div>

</div>

<footer>
© 2026 LexaW
</footer>

<!-- Particle.js kütüphanesi -->
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
particlesJS("particles-js", {
  "particles": {
    "number": { "value": 80 },
    "color": { "value": "#00aaff" },
    "shape": { "type": "circle" },
    "opacity": { "value": 0.5 },
    "size": { "value": 3 },
    "line_linked": { "enable": true, "distance": 150, "color": "#00aaff", "opacity": 0.4 },
    "move": { "enable": true, "speed": 3 }
  }
});
</script>

</body>
</html>
